<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combate por Turnos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="combat-area">
      <div class="char-box" id="player-box">
        <img id="player-img" src="" alt="Jugador">
        <h2 id="player-name">—</h2>
        <div class="hp-bar">
          <div class="hp-fill" id="player-hp-fill" style="width:100%"></div>
          <span class="hp-text" id="player-hp-text">HP: —</span>
        </div>
        <p class="stat-text" id="player-evasion">Evasión: —</p>
        <p class="status-text" id="player-status">Estado: —</p>
        <p class="buffs-text" id="player-buffs">Buffs: —</p>
      </div>

      <div class="vs-divider">⚔️</div>

      <div class="char-box enemy" id="enemy-box">
        <img id="enemy-img" src="" alt="Enemigo">
        <h2 id="enemy-name">—</h2>
        <div class="hp-bar">
          <div class="hp-fill" id="enemy-hp-fill" style="width:100%"></div>
          <span class="hp-text" id="enemy-hp-text">HP: —</span>
        </div>
        <p class="stat-text" id="enemy-evasion">Evasión: —</p>
        <p class="status-text" id="enemy-status">Estado: —</p>
        <p class="buffs-text" id="enemy-buffs">Buffs: —</p>
      </div>
    </div>

    <div id="log"></div>
    <div id="actions"></div>
    <div id="restart-area"></div>
  </div>

  <script src="models.js"></script>
  <script src="characters.js"></script>
  <script src="game.js"></script>
  <script>initGame();</script>
</body>
</html>
