<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combate por Equipos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="combat-area">
      <div class="team-container" id="team-A-container">
        <div class="team-label" id="team-A-name">EQUIPO A</div>
        <div class="team-grid" id="team-A-grid"></div>
      </div>

      <div class="vs-divider">⚔️</div>

      <div class="team-container" id="team-B-container">
        <div class="team-label" id="team-B-name">EQUIPO B</div>
        <div class="team-grid" id="team-B-grid"></div>
      </div>
    </div>

    <div id="log"></div>
    <div id="actions"></div>
    <div id="restart-area"></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
